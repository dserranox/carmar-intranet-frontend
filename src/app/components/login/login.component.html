<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h2 class="login-title">Car-Mar</h2>
      <p class="login-subtitle">Sistema de gestión interna</p>
    </div>

    <form (ngSubmit)="login()" #form="ngForm">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Usuario</mat-label>
        <input matInput name="username" [(ngModel)]="username" required autocomplete="username">
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full">
        <mat-label>Contraseña</mat-label>
        <input matInput [type]="hideActual ? 'password' : 'text'" name="password" [(ngModel)]="password" required autocomplete="current-password">
        <button mat-icon-button matSuffix type="button" (click)="hideActual = !hideActual">
          <mat-icon>{{ hideActual ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      @if (errorMessage) {
        <div class="error-message">
          <mat-icon class="error-icon">error_outline</mat-icon>
          {{ errorMessage }}
        </div>
      }

      <button mat-flat-button class="full btn-login" type="submit" [disabled]="loading">
        @if (loading) {
          Ingresando...
        } @else {
          Ingresar
        }
      </button>
    </form>

  </div>
</div>
